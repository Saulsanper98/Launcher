<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Dev Launcher · CCM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080a10;
      --surface:     #0d1017;
      --surface2:    #111520;
      --surface3:    #161b27;
      --border:      #1a2035;
      --border2:     #232c42;
      --text:        #e2e8f4;
      --muted:       #48567a;
      --muted2:      #6b7fa8;
      --accent:      #ffeb66;
      --accent-dim:  rgba(255,235,102,.08);
      --accent-glow: rgba(255,235,102,.18);
      --red:         #f87171;
      --red-dim:     rgba(248,113,113,.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Gran Canaria: silueta OSM (tamaño sin cambios; más contraste / relieve) ── */
    .island-relief {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(88vw, 760px);
      max-height: 50vh;
      pointer-events: none;
      z-index: 0;
      opacity: .95;
      mask-image: linear-gradient(to top, #000 0%, #000 68%, transparent 100%);
      -webkit-mask-image: linear-gradient(to top, #000 0%, #000 68%, transparent 100%);
    }
    .island-relief svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
      filter: saturate(1.12) contrast(1.05);
    }
    @media (max-width: 680px) {
      .island-relief {
        max-height: 40vh;
        bottom: -1vh;
        width: min(94vw, 600px);
        opacity: .88;
      }
    }

    /* ── Dot grid background ───────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #253050 1.5px, transparent 1.5px);
      background-size: 30px 30px;
      opacity: .55;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Ambient glows ─────────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,235,102,.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 2;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(180deg, rgba(13,16,23,0.98) 0%, rgba(10,13,20,0.95) 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 62px;
      display: flex;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(8px);
    }

    /* accent line at very top of header */
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,235,102,.3) 40%, rgba(255,235,102,.3) 60%, transparent 100%);
    }

    /* glow under header */
    header::after {
      content: '';
      position: absolute;
      bottom: -20px; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 40px;
      background: radial-gradient(ellipse, rgba(255,235,102,.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-svg { height: 26px; width: auto; }

    .logo-divider {
      width: 1px; height: 24px;
      background: linear-gradient(180deg, transparent, var(--border2), transparent);
    }

    .header-title { display: flex; flex-direction: column; gap: 1px; }
    .header-title strong { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -.2px; }
    .header-title span   { font-size: 11px; color: var(--muted2); }

    .header-spacer { flex: 1; }

    .header-controls { display: flex; align-items: center; gap: 8px; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px;
      background: var(--surface2); border: 1px solid var(--border2);
      font-size: 11px; color: var(--muted2);
    }
    .status-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
      animation: blink 2.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }
    /* Solo movimiento: nunca opacity 0 en “both”, evita tarjetas invisibles si la animación no corre */
    @keyframes fadeUp {
      from { transform: translateY(12px); }
      to   { transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .hbtn {
      height: 32px; padding: 0 14px; border-radius: 7px;
      border: 1px solid var(--border2); background: transparent;
      color: var(--muted2); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .hbtn:hover { color: var(--text); border-color: rgba(255,235,102,.4); background: var(--accent-dim); }
    .hbtn.primary {
      background: linear-gradient(135deg, #ffeb66 0%, #f5d800 100%);
      border-color: #ffeb66; color: #0a0c10; font-weight: 700;
      box-shadow: 0 2px 12px rgba(255,235,102,.2);
    }
    .hbtn.primary:hover { filter: brightness(1.08); box-shadow: 0 4px 18px rgba(255,235,102,.3); }

    /* ── Main grid (alineado arriba: deja aire e isla visible debajo) ── */
    main {
      position: relative;
      z-index: 15;
      isolation: isolate;
      flex: 1;
      width: 100%;
      min-height: 200px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 32px 52px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 420px));
      gap: 20px;
      width: 100%;
      max-width: 1320px;
    }

    @media (max-width: 1100px) {
      .app-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .app-grid { grid-template-columns: 1fr; }
    }

    /* ── App Card (cristal: se ve la isla detrás sin perder legibilidad) ── */
    .card {
      position: relative;
      opacity: 1;
      background: linear-gradient(165deg, rgba(14,18,28,.48) 0%, rgba(9,12,20,.58) 100%);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 16px; overflow: hidden;
      display: flex; flex-direction: column;
      backdrop-filter: blur(14px) saturate(1.12);
      -webkit-backdrop-filter: blur(14px) saturate(1.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 8px 32px rgba(0,0,0,.25);
      transition: border-color .3s, box-shadow .3s, transform .2s;
      animation: fadeUp .45s ease forwards;
    }
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none !important; transform: none !important; }
    }
    .card:nth-child(2) { animation-delay: .06s; }
    .card:nth-child(3) { animation-delay: .12s; }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,.4);
    }

    .card.running {
      border-color: color-mix(in srgb, var(--app-color) 35%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--app-color) 10%, transparent),
                  0 8px 32px color-mix(in srgb, var(--app-color) 10%, transparent);
    }
    .card.running:hover {
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--app-color) 15%, transparent),
                  0 16px 48px color-mix(in srgb, var(--app-color) 14%, transparent);
    }
    .card.starting { border-color: rgba(255,235,102,.3); }
    .card.partial  { border-color: rgba(255,235,102,.3); }

    /* top color bar */
    .card-bar {
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--app-color, var(--border)) 30%, var(--app-color, var(--border)) 70%, transparent 100%);
      opacity: .4; transition: opacity .3s;
    }
    .card.running .card-bar { opacity: 1; }

    /* inner glow at top */
    .card-inner-glow {
      position: absolute; top: 0; left: 0; right: 0; height: 80px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--app-color) 5%, transparent) 0%, transparent 100%);
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .card.running .card-inner-glow { opacity: 1; }

    .card-header {
      padding: 18px 20px 12px;
      display: flex; align-items: flex-start; gap: 14px;
    }

    /* Icon: letter badge instead of emoji */
    .card-icon {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      background: color-mix(in srgb, var(--app-color) 12%, rgba(13,16,23,.8));
      border: 1px solid color-mix(in srgb, var(--app-color) 22%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; letter-spacing: -.5px;
      color: var(--app-color);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--app-color) 12%, transparent),
                  inset 0 1px 0 rgba(255,255,255,.04);
    }

    .card-meta { flex: 1; min-width: 0; }
    .card-meta h2 {
      font-size: 14px; font-weight: 700; letter-spacing: -.2px; color: var(--text);
    }
    .card-meta p { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .card-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; margin-top: 5px;
      color: var(--muted2);
    }
    .card-status .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); transition: background .3s, box-shadow .3s;
    }
    .card.running  .sdot { background: var(--app-color); box-shadow: 0 0 6px var(--app-color); }
    .card.starting .sdot { background: var(--accent); animation: blink .7s infinite; }
    .card.partial  .sdot { background: var(--accent); }
    .card.running  .card-status { color: color-mix(in srgb, var(--app-color) 85%, #fff); }
    .card.starting .card-status { color: var(--accent); }

    .uptime-badge {
      font-size: 10px; font-weight: 500;
      color: var(--muted); opacity: .7;
      font-variant-numeric: tabular-nums;
    }

    /* ── Process badges ──────────────────────────────────────────── */
    .procs {
      margin: 0 20px 14px;
      display: flex; flex-wrap: wrap; gap: 6px;
    }

    .proc-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px 3px 8px; border-radius: 6px;
      background: var(--surface3); border: 1px solid var(--border2);
      font-size: 11px; color: var(--muted2);
      transition: all .25s;
    }
    .proc-badge .pdot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: all .25s;
    }
    .proc-badge.running {
      color: color-mix(in srgb, var(--app-color) 90%, #fff);
      border-color: color-mix(in srgb, var(--app-color) 20%, transparent);
      background: color-mix(in srgb, var(--app-color) 7%, transparent);
    }
    .proc-badge.running .pdot {
      background: var(--app-color);
      box-shadow: 0 0 5px var(--app-color);
    }
    .proc-badge.starting .pdot { background: var(--accent); animation: blink .7s infinite; }

    /* ── Action row ──────────────────────────────────────────────── */
    .card-actions {
      padding: 12px 20px 16px;
      display: flex; gap: 7px;
      border-top: 1px solid rgba(255,255,255,.06);
      background: rgba(4,6,12,.32);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .btn {
      height: 34px; padding: 0 14px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all .15s;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .btn:disabled { opacity: .28; cursor: not-allowed; filter: none !important; }

    .btn-start {
      flex: 1;
      background: color-mix(in srgb, var(--app-color) 22%, rgba(10,12,20,0.9));
      color: color-mix(in srgb, var(--app-color) 95%, #fff);
      font-weight: 700;
      border: 1px solid color-mix(in srgb, var(--app-color) 35%, transparent);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }
    .btn-start:hover:not(:disabled) {
      background: color-mix(in srgb, var(--app-color) 32%, rgba(10,12,20,0.85));
      border-color: color-mix(in srgb, var(--app-color) 55%, transparent);
      box-shadow: 0 4px 16px color-mix(in srgb, var(--app-color) 20%, transparent),
                  inset 0 1px 0 rgba(255,255,255,.08);
    }

    .btn-stop {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(248,113,113,.15);
    }
    .btn-stop:hover:not(:disabled) {
      background: rgba(248,113,113,.15);
      border-color: rgba(248,113,113,.3);
      box-shadow: 0 2px 10px rgba(248,113,113,.12);
    }

    .btn-icon {
      width: 34px; padding: 0;
      background: var(--surface3); color: var(--muted2);
      border: 1px solid var(--border2);
      justify-content: center; font-size: 15px;
      border-radius: 8px; position: relative;
    }
    .btn-icon[data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      background: #1e2640; border: 1px solid var(--border2);
      color: var(--muted2); font-size: 10px; font-weight: 500;
      padding: 3px 7px; border-radius: 5px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .15s;
    }
    .btn-icon:hover[data-tip]::after { opacity: 1; }
    .btn-icon:hover:not(:disabled) {
      color: var(--accent); border-color: rgba(255,235,102,.35);
      background: var(--accent-dim);
    }
    .btn-restart:hover:not(:disabled) {
      color: #6ee7b7; border-color: rgba(110,231,183,.35);
      background: rgba(110,231,183,.06);
    }

    /* ── Log panel ───────────────────────────────────────────────── */
    .log-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 20px; cursor: pointer; user-select: none;
      border-top: 1px solid var(--border);
      transition: background .15s;
    }
    .log-toggle:hover { background: rgba(255,255,255,.02); }

    .lt-label {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 7px;
    }

    .new-badge {
      display: none;
      background: var(--accent); color: #080a10;
      font-size: 9px; font-weight: 800; letter-spacing: .5px;
      padding: 1px 5px; border-radius: 4px;
      animation: blink .9s ease-in-out infinite;
    }
    .new-badge.show { display: inline; }

    .lt-log-count {
      font-size: 10px; color: var(--muted);
      background: var(--surface3); border: 1px solid var(--border2);
      padding: 1px 6px; border-radius: 10px;
    }

    .chevron { font-size: 9px; color: var(--muted); transition: transform .2s; }
    .log-toggle.open .chevron { transform: rotate(180deg); }

    .log-panel {
      display: none; border-top: 1px solid rgba(255,255,255,.06);
      background: rgba(5,7,12,.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .log-panel.visible { display: block; animation: slideIn .15s ease; }

    .log-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: rgba(4,6,10,.45);
    }
    .log-toolbar-left { display: flex; gap: 5px; align-items: center; flex: 1; flex-wrap: wrap; }

    .log-search {
      margin-left: auto;
      height: 22px; padding: 0 8px; border-radius: 5px;
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--muted2); font-size: 11px; outline: none;
      width: 120px; transition: all .15s;
    }
    .log-search::placeholder { color: var(--muted); }
    .log-search:focus {
      border-color: rgba(59,130,246,.4); color: var(--text); width: 160px;
      box-shadow: 0 0 0 2px rgba(59,130,246,.08);
    }
    .proc-filter-btn {
      padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 600;
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .proc-filter-btn.active {
      background: color-mix(in srgb, var(--app-color) 12%, transparent);
      border-color: color-mix(in srgb, var(--app-color) 30%, transparent);
      color: color-mix(in srgb, var(--app-color) 90%, #fff);
    }
    .log-clear-btn {
      padding: 2px 8px; border-radius: 5px; font-size: 10px;
      background: transparent; border: 1px solid transparent;
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .log-clear-btn:hover { color: var(--red); border-color: rgba(248,113,113,.2); }

    .log-output {
      height: 210px; overflow-y: auto;
      padding: 10px 16px;
      font-family: 'Cascadia Code', 'Cascadia Mono', 'Consolas', 'Courier New', monospace;
      font-size: 11px; line-height: 1.7; color: #6a7d9e;
    }
    .log-output::-webkit-scrollbar { width: 3px; }
    .log-output::-webkit-scrollbar-track { background: transparent; }
    .log-output::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .log-line { display: flex; gap: 10px; padding: 0; }
    .log-line .ts  {
      font-size: 10px; opacity: .35; flex-shrink: 0;
      padding-top: 1px; color: #4a5a7a; min-width: 44px;
      font-variant-numeric: tabular-nums;
    }
    .log-line .tag {
      font-size: 10px; flex-shrink: 0; padding-top: 1px;
      color: var(--app-color, #64748b); opacity: .55;
      min-width: 58px; max-width: 58px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .log-line .txt { word-break: break-all; flex: 1; }
    .log-line.err  .txt  { color: #f87171; }
    .log-line.ok   .txt  { color: #6ee7b7; }
    .log-line.warn .txt  { color: #fde68a; }
    .log-line.info .txt  { color: #7d90b8; }
    .log-line.sys  .txt  { color: color-mix(in srgb, var(--accent) 70%, #aaa); opacity: .9; }

    /* ── Footer ──────────────────────────────────────────────────── */
    footer {
      position: relative; z-index: 10;
      height: 36px; padding: 0 32px;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(10,13,20,.95) 0%, rgba(8,10,16,.98) 100%);
      display: flex; align-items: center; gap: 14px;
      font-size: 11px; color: var(--muted);
    }
    footer a { color: var(--muted2); text-decoration: none; transition: color .15s; }
    footer a:hover { color: var(--accent); }
    .footer-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 5px var(--accent-glow);
      animation: blink 2.5s infinite;
    }
    .footer-sep { color: var(--border2); }
    .footer-osm { color: var(--muted); opacity: .55; font-size: 10px; text-decoration: none; }
    .footer-osm:hover { color: var(--muted2); opacity: .85; }
    .footer-time { margin-left: auto; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>

<!-- Costa de Gran Canaria (contorno simplificado desde datos OpenStreetMap, ODbL) -->
<div class="island-relief" aria-hidden="true">
  <svg viewBox="0 0 1000 1180" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Oblicuo: sombra profunda SW → luz más fría y visible NE -->
      <linearGradient id="gc-hillshade" x1="-6%" y1="104%" x2="97%" y2="-10%" gradientUnits="objectBoundingBox">
        <stop offset="0%" stop-color="#05070d"/>
        <stop offset="28%" stop-color="#0f1626"/>
        <stop offset="52%" stop-color="#1a2a44"/>
        <stop offset="76%" stop-color="#2a4270"/>
        <stop offset="100%" stop-color="#3d5c94"/>
      </linearGradient>
      <!-- Contraluz suave (lados en sombra) para leer volumen frente al macizo -->
      <radialGradient id="gc-veil" cx="72%" cy="74%" r="58%" fx="82%" fy="86%" gradientUnits="objectBoundingBox">
        <stop offset="0%" stop-color="#020308" stop-opacity=".38"/>
        <stop offset="45%" stop-color="#0a101c" stop-opacity=".14"/>
        <stop offset="100%" stop-color="#05070c" stop-opacity="0"/>
      </radialGradient>
      <!-- Macizo central (cumbres): más intenso y amplio -->
      <radialGradient id="gc-massif" cx="48%" cy="39%" r="56%" fx="39%" fy="30%" gradientUnits="objectBoundingBox">
        <stop offset="0%" stop-color="#dce4f8" stop-opacity=".5"/>
        <stop offset="18%" stop-color="#8fa0cc" stop-opacity=".32"/>
        <stop offset="40%" stop-color="#4a5d88" stop-opacity=".14"/>
        <stop offset="72%" stop-color="#1c2638" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="gc-rim" x1="38%" y1="0%" x2="62%" y2="100%">
        <stop offset="0%" stop-color="#ffeb66" stop-opacity=".32"/>

<script>
// ─────────────────────────────────────────────────────────────────────────────
let config    = { apps: [] };
let appStatus = {};
let sseConns  = {};

const STATUS_LABEL = {
  running:  'En ejecución',
  stopped:  'Detenida',
  starting: 'Iniciando…',
  partial:  'Parcialmente activa',
};

// Icon letter for each app
const APP_LETTER = {
  diario:      'D',
  incidencias: 'I',
  sysops:      'S',
};

// ── Clock ─────────────────────────────────────────────────────────────────────
(function clock() {
  const el = document.getElementById('clock');
  setInterval(() => {
    el.textContent = new Date().toLocaleTimeString('es-ES');
  }, 1000);
  el.textContent = new Date().toLocaleTimeString('es-ES');
})();

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const [cfg, status] = await Promise.all([
    fetch('/api/config').then(r => r.json()),
    fetch('/api/status').then(r => r.json()),
  ]);
  config    = cfg;
  appStatus = status;

  // Cargar uptimes iniciales desde /api/status
  for (const app of cfg.apps) {
    const uptimes = status[app.id]?.uptimes ?? {};
    for (const [pn, ts] of Object.entries(uptimes)) {
      procStartedAt[`${app.id}:${pn}`] = ts;
    }
  }

  renderGrid();
  for (const app of config.apps) connectSSE(app.id);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('appGrid');
  grid.innerHTML = '';
  for (const app of config.apps) grid.appendChild(buildCard(app));
  updateSummary();
}

function buildCard(app) {
  const st  = appStatus[app.id]?.app ?? 'stopped';
  const div = document.createElement('div');
  div.className = `card ${st}`;
  div.id = `card-${app.id}`;
  div.style.setProperty('--app-color', app.color);

  const procBadges = app.processes.map(p => {
    const ps = appStatus[app.id]?.processes?.[p.name] ?? 'stopped';
    return `<div class="proc-badge ${ps}" id="proc-${app.id}-${slug(p.name)}">
      <div class="pdot"></div>${p.name}
    </div>`;
  }).join('');

  const active = ['running','starting','partial'].includes(st);

  div.innerHTML = `
    <div class="card-bar"></div>
    <div class="card-inner-glow"></div>

    <div class="card-header">
      <div class="card-icon">${APP_LETTER[app.id] ?? app.name[0]}</div>
      <div class="card-meta">
        <h2>${app.name}</h2>
        <p>${app.description ?? ''}</p>
        <div class="card-status">
          <div class="sdot"></div>
          <span class="card-status-text">${STATUS_LABEL[st] ?? st}</span>
          <span class="uptime-badge" id="uptime-${app.id}" style="display:none"></span>
        </div>
      </div>
    </div>

    <div class="procs" id="procs-${app.id}">${procBadges}</div>

    <div class="card-actions">
      <button class="btn btn-start" id="bs-${app.id}" onclick="startApp('${app.id}')"
        ${['running','starting'].includes(st) ? 'disabled' : ''}
        style="--app-color:${app.color}">
        ▶&nbsp;Iniciar
      </button>
      <button class="btn btn-stop" id="bp-${app.id}" onclick="stopApp('${app.id}')"
        ${!active ? 'disabled' : ''}>
        ■&nbsp;Detener
      </button>
      <button class="btn btn-icon btn-restart" id="br-${app.id}" onclick="restartApp('${app.id}')"
        data-tip="Reiniciar" ${!active ? 'disabled' : ''}>⟳</button>
      <button class="btn btn-icon" onclick="openUrl('${app.url}')"
        data-tip="Abrir" ${st !== 'running' ? 'disabled' : ''}>↗</button>
    </div>

    <div class="log-toggle" id="lt-${app.id}" onclick="toggleLog('${app.id}')">
      <span class="lt-label">
        <span>Logs</span>
        <span class="new-badge" id="nb-${app.id}">NUEVO</span>
        <span class="lt-log-count" id="lc-${app.id}">0</span>
      </span>
      <span class="chevron">▼</span>
    </div>
    <div class="log-panel" id="lp-${app.id}">
      <div class="log-toolbar" style="--app-color:${app.color}">
        <div class="log-toolbar-left" id="filters-${app.id}">
          <button class="proc-filter-btn active" data-filter="all" onclick="setFilter('${app.id}','all',this)">Todos</button>
          ${app.processes.map(p =>
            `<button class="proc-filter-btn" data-filter="${p.name}" onclick="setFilter('${app.id}','${p.name}',this)">${p.name.split(' ')[0]}</button>`
          ).join('')}
        </div>
        <input class="log-search" id="ls-${app.id}" placeholder="Buscar…"
          oninput="searchLogs('${app.id}', this.value)" />
        <button class="log-clear-btn" onclick="clearLog('${app.id}')">Limpiar</button>
      </div>
      <div class="log-output" id="lo-${app.id}"></div>
    </div>
  `;
  return div;
}

function slug(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

// ── Log filter + search ───────────────────────────────────────────────────────
const logFilters = {};
const logSearches = {};

function applyLogVisibility(appId) {
  const filter = logFilters[appId] ?? 'all';
  const q      = (logSearches[appId] ?? '').toLowerCase();
  const out    = document.getElementById(`lo-${appId}`);
  if (!out) return;
  for (const line of out.querySelectorAll('.log-line')) {
    const matchFilter = filter === 'all' || line.dataset.proc === filter;
    const matchSearch = !q || (line.querySelector('.txt')?.textContent ?? '').toLowerCase().includes(q);
    line.style.display = (matchFilter && matchSearch) ? '' : 'none';
  }
}

function setFilter(appId, filter, btn) {
  logFilters[appId] = filter;
  document.getElementById(`filters-${appId}`)
    .querySelectorAll('.proc-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyLogVisibility(appId);
}

function searchLogs(appId, q) {
  logSearches[appId] = q;
  applyLogVisibility(appId);
}

function clearLog(appId) {
  const out = document.getElementById(`lo-${appId}`);
  out.innerHTML = '';
  const counter = document.getElementById(`lc-${appId}`);
  if (counter) counter.textContent = '0';
}

// ── Card update ───────────────────────────────────────────────────────────────
function updateCard(appId, fullStatus) {
  if (fullStatus) appStatus[appId] = fullStatus;
  const st   = appStatus[appId]?.app ?? 'stopped';
  const app  = config.apps.find(a => a.id === appId);
  const card = document.getElementById(`card-${appId}`);
  if (!card || !app) return;

  card.className = `card ${st}`;
  const active = ['running','starting','partial'].includes(st);
  document.getElementById(`bs-${appId}`).disabled = ['running','starting'].includes(st);
  document.getElementById(`bp-${appId}`).disabled = !active;
  document.getElementById(`br-${appId}`).disabled = !active;
  card.querySelectorAll('.btn-icon').forEach(b => {
    if (b.dataset.tip === 'Abrir') b.disabled = st !== 'running';
  });
  card.querySelector('.card-status-text').textContent = STATUS_LABEL[st] ?? st;

  for (const proc of app.processes) {
    const badge = document.getElementById(`proc-${appId}-${slug(proc.name)}`);
    if (badge) badge.className = `proc-badge ${appStatus[appId]?.processes?.[proc.name] ?? 'stopped'}`;
  }

  updateSummary();
}

// ── Logs ──────────────────────────────────────────────────────────────────────
let logCounts = {};

function appendLog(appId, entry) {
  const out = document.getElementById(`lo-${appId}`);
  if (!out) return;

  logCounts[appId] = (logCounts[appId] ?? 0) + 1;
  const counter = document.getElementById(`lc-${appId}`);
  if (counter) counter.textContent = logCounts[appId] > 999 ? '999+' : logCounts[appId];

  const filter = logFilters[appId] ?? 'all';
  const cls    = classifyLine(entry.text);

  const line = document.createElement('div');
  line.className       = `log-line ${cls}`;
  line.dataset.proc    = entry.proc;
  line.style.display   = (filter === 'all' || filter === entry.proc) ? '' : 'none';

  // timestamp HH:MM:SS
  const ts  = document.createElement('span');
  ts.className = 'ts';
  const d = new Date(entry.ts);
  ts.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;

  const tag = document.createElement('span');
  tag.className   = 'tag';
  tag.textContent = `[${(entry.proc || '').split(' ')[0]}]`;

  const txt = document.createElement('span');
  txt.className   = 'txt';
  txt.textContent = entry.text;

  // Aplicar filtro activo + búsqueda a la nueva línea
  const activeFilter = logFilters[appId] ?? 'all';
  const activeSearch = (logSearches[appId] ?? '').toLowerCase();
  const matchFilter = activeFilter === 'all' || entry.proc === activeFilter;
  const matchSearch = !activeSearch || entry.text.toLowerCase().includes(activeSearch);
  line.style.display = (matchFilter && matchSearch) ? '' : 'none';

  line.appendChild(ts);
  line.appendChild(tag);
  line.appendChild(txt);
  out.appendChild(line);
  if (matchFilter && matchSearch) out.scrollTop = out.scrollHeight;
  while (out.children.length > 600) out.removeChild(out.firstChild);

  // NUEVO badge si el panel está cerrado
  const panel = document.getElementById(`lp-${appId}`);
  if (!panel.classList.contains('visible')) {
    document.getElementById(`nb-${appId}`)?.classList.add('show');
  }
}

function classifyLine(t) {
  const l = t.toLowerCase();
  if (/\berror\b|err:|failed|exception|fatal|✗/.test(l)) return 'err';
  if (/warn|warning/.test(l)) return 'warn';
  if (/✓|ready|compiled|started|listening|running|success/.test(l)) return 'ok';
  if (/▶|■|iniciando|deteniendo|proceso|✓/.test(l)) return 'sys';
  return 'info';
}

// ── Log toggle ────────────────────────────────────────────────────────────────
function toggleLog(appId) {
  const panel  = document.getElementById(`lp-${appId}`);
  const toggle = document.getElementById(`lt-${appId}`);
  const open   = !panel.classList.contains('visible');
  panel.classList.toggle('visible', open);
  toggle.classList.toggle('open', open);
  if (open) {
    document.getElementById(`nb-${appId}`)?.classList.remove('show');
    // scroll to bottom
    const out = document.getElementById(`lo-${appId}`);
    if (out) out.scrollTop = out.scrollHeight;
  }
}

// ── Uptime tracking ───────────────────────────────────────────────────────────
const procStartedAt = {}; // "appId:procName" -> timestamp

function formatUptime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}h ${m % 60}m`;
  if (m > 0) return `${m}m ${s % 60}s`;
  return `${s}s`;
}

setInterval(() => {
  for (const app of config.apps) {
    const el = document.getElementById(`uptime-${app.id}`);
    if (!el) continue;
    // Tomar el startedAt más antiguo entre los procesos corriendo
    let earliest = null;
    for (const proc of app.processes) {
      const t = procStartedAt[`${app.id}:${proc.name}`];
      if (t && (!earliest || t < earliest)) earliest = t;
    }
    const running = appStatus[app.id]?.app === 'running';
    if (running && earliest) {
      el.textContent = '· ' + formatUptime(Date.now() - earliest);
      el.style.display = '';
    } else {
      el.style.display = 'none';
    }
  }
}, 1000);

// ── Notifications ─────────────────────────────────────────────────────────────
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}
function notify(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, silent: false });
  }
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectSSE(appId) {
  if (sseConns[appId]) { try { sseConns[appId].close(); } catch {} }
  const es = new EventSource(`/api/apps/${appId}/logs`);
  sseConns[appId] = es;

  es.onmessage = e => {
    const d = JSON.parse(e.data);
    const appName = config.apps.find(a => a.id === appId)?.name ?? appId;

    if (d.type === 'log') {
      appendLog(appId, d);

    } else if (d.type === 'status') {
      if (!appStatus[appId]) appStatus[appId] = {};
      appStatus[appId].app = d.status;
      // Guardar uptimes
      if (d.uptimes) {
        for (const [pn, ts] of Object.entries(d.uptimes)) {
          procStartedAt[`${appId}:${pn}`] = ts;
        }
      }
      updateCard(appId);

    } else if (d.type === 'proc_started') {
      notify(`✓ ${appName}`, `${d.proc} arrancó correctamente`);

    } else if (d.type === 'crashed') {
      if (d.restarting) {
        notify(`⚠ ${appName}`, `${d.proc} se cayó — reintentando en ${d.retryIn / 1000}s`);
      } else {
        notify(`✗ ${appName}`, `${d.proc} se cayó y no se pudo reiniciar`);
      }
    }
  };
  es.onerror = () => setTimeout(() => connectSSE(appId), 4000);
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function startApp(id) {
  setFooter(`Iniciando ${config.apps.find(a=>a.id===id)?.name ?? id}…`);
  await fetch(`/api/apps/${id}/start`, { method: 'POST' });
}
async function stopApp(id) {
  setFooter(`Deteniendo ${config.apps.find(a=>a.id===id)?.name ?? id}…`);
  await fetch(`/api/apps/${id}/stop`, { method: 'POST' });
}
async function restartApp(id) {
  const name = config.apps.find(a=>a.id===id)?.name ?? id;
  setFooter(`Reiniciando ${name}…`);
  await fetch(`/api/apps/${id}/restart`, { method: 'POST' });
}
function openUrl(url) { window.open(url, '_blank'); }

document.getElementById('startAll').onclick = () => {
  setFooter('Iniciando todas las aplicaciones…');
  config.apps.forEach(a => startApp(a.id));
};
document.getElementById('stopAll').onclick = () => {
  setFooter('Deteniendo todas las aplicaciones…');
  config.apps.forEach(a => stopApp(a.id));
};

// ── Summary ───────────────────────────────────────────────────────────────────
function updateSummary() {
  const running = config.apps.filter(a => appStatus[a.id]?.app === 'running').length;
  const total   = config.apps.length;
  document.getElementById('runningCount').textContent = `${running} de ${total} activas`;
}

function setFooter(msg) {
  document.getElementById('footerMsg').textContent = msg;
  setTimeout(() => document.getElementById('footerMsg').textContent = 'Listo', 4000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) config.apps.forEach(a => connectSSE(a.id));
});
</script>
